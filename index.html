<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Suomikortit</title>
<meta name="description" content="Finnish sentence flashcards — tap to flip." />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#DCEEF0" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#DCEEF0;        /* soft blue-green field */
    --paper-2:#CFE7DC;
    --surface:rgba(255,255,255,.42);   /* frosted glass face */
    --ink:#14333A;          /* deep teal ink */
    --ink-soft:#3E5E63;
    --hair:rgba(255,255,255,.55);      /* soft white glass border */
    --lake:#1C8BA6;         /* teal-blue primary accent */
    --lake-deep:#15788F;
    /* category hues */
    --c-conjunction:#2D8BB0;
    --c-daily:#3E957A;
    --c-idiom:#C08A3E;
    --c-proverb:#A8557A;
    --c-quote:#4E7A86;
    --r:20px;
    --glass-blur:saturate(160%) blur(16px);
    --glass-hi:inset 0 1px 0 rgba(255,255,255,.7), inset 0 -1px 0 rgba(255,255,255,.18);
    --shadow:0 1px 2px rgba(20,51,58,.06), 0 22px 46px -24px rgba(20,51,58,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(60% 50% at 12% 8%, rgba(120,210,200,.55) 0%, transparent 60%),
      radial-gradient(55% 45% at 88% 14%, rgba(120,190,230,.55) 0%, transparent 60%),
      radial-gradient(70% 55% at 78% 92%, rgba(150,225,195,.5) 0%, transparent 62%),
      radial-gradient(65% 50% at 18% 88%, rgba(125,195,225,.45) 0%, transparent 60%),
      linear-gradient(160deg, var(--paper) 0%, var(--paper-2) 100%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:"Hanken Grotesk",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;
    min-height:100dvh;
    padding:max(14px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
  }
  .wrap{width:100%;max-width:560px;margin:0 auto;flex:1;display:flex;flex-direction:column;gap:14px}

  /* header */
  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .brand{font-family:"Spectral",serif;font-weight:600;font-size:22px;letter-spacing:-.01em}
  .brand b{color:var(--lake)}
  .count{font-variant-numeric:tabular-nums;font-size:13px;color:var(--ink-soft);font-weight:600}

  /* filter row */
  .filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;border:1px solid var(--hair);background:rgba(255,255,255,.3);color:var(--ink-soft);
    -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    box-shadow:var(--glass-hi);
    font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;
    cursor:pointer;transition:all .15s ease;white-space:nowrap;letter-spacing:.01em;
  }
  .chip[aria-pressed="true"]{
    background:linear-gradient(180deg, var(--lake) 0%, var(--lake-deep) 100%);
    color:#F2FBFD;border-color:rgba(255,255,255,.55);
    box-shadow:var(--glass-hi), 0 6px 16px -8px rgba(28,139,166,.6);
  }
  .chip:focus-visible{outline:2px solid var(--lake);outline-offset:2px}

  /* card */
  .scene{flex:1;perspective:1600px;min-height:60vh;display:flex}
  .card{
    position:relative;width:100%;border-radius:var(--r);
    transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.7,.2,1);
    cursor:pointer;
  }
  .card.flipped{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);
    -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    box-shadow:var(--shadow), var(--glass-hi);display:flex;flex-direction:column;overflow:hidden;
  }
  .face:focus-visible{outline:2px solid var(--lake);outline-offset:3px}

  /* accent rule keyed to category */
  .face::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--cat,var(--lake))}

  /* FRONT */
  .front{padding:26px 24px 22px 28px}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
       color:var(--cat,var(--lake))}
  .pill{font-size:11px;font-weight:600;color:var(--ink-soft);border:1px solid var(--hair);
        border-radius:999px;padding:3px 9px;letter-spacing:.02em}
  .lvl{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;font-weight:600;
       color:var(--ink-soft);letter-spacing:.04em}
  .sentence{
    flex:1;display:flex;align-items:center;margin:14px 0 4px;padding:18px 20px;
    font-family:"Caveat",cursive;font-weight:600;line-height:1.1;letter-spacing:0;
    font-size:clamp(40px,10vw,58px);
    background:linear-gradient(180deg, rgba(120,205,170,.28) 0%, rgba(120,205,170,.12) 100%);
    border:1px solid rgba(255,255,255,.5);border-radius:14px;
    box-shadow:var(--glass-hi);
  }
  .hint{font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
  .hint svg{width:15px;height:15px;opacity:.7}

  /* BACK */
  .back{transform:rotateY(180deg);padding:24px 22px 22px 26px}
  .back .translation{font-family:"Caveat",cursive;font-weight:500;font-size:clamp(27px,6.4vw,33px);
        line-height:1.15;color:var(--ink);margin:2px 0 14px}
  .focus{font-size:13.5px;line-height:1.45;color:var(--ink-soft);
        border-left:2px solid var(--cat,var(--lake));padding-left:11px;margin-bottom:16px}
  .focus b{color:var(--ink);font-weight:700}
  .parts{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0;margin:0;list-style:none;padding:0}
  .parts li{padding:11px 0;border-top:1px solid var(--hair)}
  .parts li:first-child{border-top:none}
  .k{font-family:"Spectral",serif;font-weight:600;font-size:16px;color:var(--ink)}
  .v{font-size:13.5px;line-height:1.45;color:var(--ink-soft);margin-top:2px}
  .v code{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:var(--paper-2);
        padding:1px 5px;border-radius:5px;color:var(--lake-deep)}
  .back-foot{font-size:11.5px;color:var(--ink-soft);opacity:.7;margin-top:10px;text-align:right}

  /* controls */
  .controls{display:flex;align-items:center;gap:10px}
  .nav{flex:1;display:flex;gap:10px}
  .btn{
    flex:1;border:1px solid var(--hair);background:rgba(255,255,255,.32);color:var(--ink);
    -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    box-shadow:var(--glass-hi);
    font-family:inherit;font-weight:600;font-size:15px;padding:14px;border-radius:14px;
    cursor:pointer;transition:transform .08s ease, background .15s ease;display:flex;
    align-items:center;justify-content:center;gap:8px;
  }
  .btn:active{transform:scale(.97)}
  .btn:focus-visible{outline:2px solid var(--lake);outline-offset:2px}
  .btn svg{width:18px;height:18px}
  .btn.icon{flex:0 0 52px;padding:14px 0}
  .btn.primary{
    background:linear-gradient(180deg, var(--lake) 0%, var(--lake-deep) 100%);
    color:#F2FBFD;border-color:rgba(255,255,255,.5);
    box-shadow:var(--glass-hi), 0 8px 20px -10px rgba(28,139,166,.65);
  }

  @media (prefers-reduced-motion:reduce){
    .card{transition:none}
  }
  @media (min-width:560px){
    .scene{min-height:54vh}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Suomi<b>kortit</b></div>
    <div class="count" id="count">–</div>
  </header>

  <div class="filters" id="filters" role="group" aria-label="Suodata kategoria"></div>

  <div class="scene">
    <div class="card" id="card">
      <!-- FRONT -->
      <div class="face front" id="front" tabindex="0" role="button" aria-label="Käännä kortti">
        <div class="meta">
          <span class="tag" id="catTag">—</span>
          <span class="lvl" id="lvl">—</span>
          <span class="pill" id="reg">—</span>
        </div>
        <div class="sentence" id="fi">…</div>
        <div class="hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 0 15 6.7L21 16"/><path d="M21 12a9 9 0 0 0-15-6.7L3 8"/><path d="M21 3v5h-5"/><path d="M3 21v-5h5"/></svg>
          Napauta nähdäksesi merkityksen
        </div>
      </div>
      <!-- BACK -->
      <div class="face back" id="back" tabindex="0" role="button" aria-label="Käännä takaisin">
        <div class="meta"><span class="tag" id="catTag2">—</span></div>
        <div class="translation" id="en">…</div>
        <div class="focus" id="focus"></div>
        <ul class="parts" id="parts"></ul>
        <div class="back-foot">Napauta kääntääksesi takaisin</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="prev" aria-label="Edellinen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
      Edellinen
    </button>
    <button class="btn primary" id="flip" aria-label="Käännä">Käännä</button>
    <button class="btn" id="next" aria-label="Seuraava">
      Seuraava
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <button class="btn icon" id="shuffle" aria-label="Sekoita">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
    </button>
  </div>
</div>

<script src="cards.js"></script>
<script>
(function(){
  "use strict";
  const CATS = {
    conjunction:{label:"Bağlaç",     color:"var(--c-conjunction)"},
    daily:      {label:"Günlük",     color:"var(--c-daily)"},
    idiom:      {label:"Deyim",      color:"var(--c-idiom)"},
    proverb:    {label:"Atasözü",    color:"var(--c-proverb)"},
    quote:      {label:"Söz/Kültür", color:"var(--c-quote)"}
  };
  const REG = { puhe:"puhekieli", kirja:"kirjakieli" };

  const ALL = (window.CARDS || []).slice();
  let deck = ALL.slice();
  let i = 0;
  let activeFilter = "all";

  const $ = id => document.getElementById(id);
  const card = $("card");

  function buildFilters(){
    const box = $("filters");
    const mk = (key,label)=>{
      const b=document.createElement("button");
      b.className="chip";b.textContent=label;b.setAttribute("aria-pressed", key===activeFilter);
      b.onclick=()=>{ activeFilter=key; applyFilter(); [...box.children].forEach(c=>c.setAttribute("aria-pressed", c===b)); };
      return b;
    };
    box.appendChild(mk("all","Kaikki"));
    Object.keys(CATS).forEach(k=>box.appendChild(mk(k,CATS[k].label)));
  }

  function applyFilter(){
    deck = activeFilter==="all" ? ALL.slice() : ALL.filter(c=>c.category===activeFilter);
    if(!deck.length) deck = ALL.slice();
    i=0; render();
  }

  function render(){
    const c = deck[i];
    if(!c) return;
    const meta = CATS[c.category] || {label:c.category,color:"var(--lake)"};
    card.classList.remove("flipped");
    card.style.setProperty("--cat", meta.color);

    $("catTag").textContent = meta.label;
    $("catTag2").textContent = meta.label;
    $("lvl").textContent = c.level;
    $("reg").textContent = REG[c.register] || c.register;
    $("fi").textContent = c.fi;
    $("en").textContent = c.en;
    $("focus").innerHTML = c.grammar ? formatInline(c.grammar) : "";
    $("focus").style.display = c.grammar ? "block" : "none";

    const ul = $("parts"); ul.innerHTML="";
    (c.parts||[]).forEach(p=>{
      const li=document.createElement("li");
      li.innerHTML = `<div class="k">${esc(p.k)}</div><div class="v">${formatInline(p.v)}</div>`;
      ul.appendChild(li);
    });
    $("count").textContent = (i+1)+" / "+deck.length;
  }

  function esc(s){return String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));}
  // wrap Finnish snippets written as `like this` in <code>
  function formatInline(s){
    return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>')
                 .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  }

  function flip(){ card.classList.toggle("flipped"); }
  function next(){ i=(i+1)%deck.length; render(); }
  function prev(){ i=(i-1+deck.length)%deck.length; render(); }
  function shuffle(){
    for(let k=deck.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[deck[k],deck[j]]=[deck[j],deck[k]];}
    i=0; render();
  }

  $("flip").onclick=flip;
  $("front").onclick=flip;
  $("back").onclick=flip;
  $("next").onclick=next;
  $("prev").onclick=prev;
  $("shuffle").onclick=shuffle;

  $("front").onkeydown=$("back").onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();flip();} };
  document.addEventListener("keydown",e=>{
    if(e.target.classList && e.target.classList.contains("face")) return;
    if(e.key==="ArrowRight") next();
    else if(e.key==="ArrowLeft") prev();
    else if(e.key===" "){e.preventDefault();flip();}
  });

  // swipe (phone)
  let x0=null,y0=null;
  const sc=document.querySelector(".scene");
  sc.addEventListener("touchstart",e=>{x0=e.touches[0].clientX;y0=e.touches[0].clientY;},{passive:true});
  sc.addEventListener("touchend",e=>{
    if(x0===null)return;
    const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
    if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)){ dx<0?next():prev(); }
    x0=y0=null;
  },{passive:true});

  buildFilters();
  if(ALL.length){ render(); }
  else { $("fi").textContent="cards.js latauksessa virhe"; }

  // PWA service worker (skip on file://)
  if("serviceWorker" in navigator && location.protocol.startsWith("http")){
    window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }
})();
</script>
</body>
</html>
